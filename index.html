    :root, [data-theme="light"] {
      --bg: #f4f6fa;
      --surface: #ffffff;

      --text-muted: #5a6a80;
      --text-faint: #8a9bb5;
      --border: #e2e8f2;
      --accent: #c4922e;
      --accent-soft: #fdf9ef;
      --hero-from: #0f1f3d;
      --hero-to: #1e3d63;
      --modal-overlay: rgba(10, 21, 40, 0.55);
      --pill-bg: #eef2f8;
      --pill-active: #0f1f3d;
      --pill-active-text: #f4f6fa;
      --nav-bg: rgba(255,255,255,0.92);
      --shadow: 0 1px 3px rgba(15,31,61,0.06);
      --code-bg: #eef2f8;
    }
    [data-theme="dark"] {
      --bg: #0a1528;
      --surface: #152d4a;
      --surface-elevated: #1a3558;
      --text: #eef2f8;
      --text-muted: #a8b8d0;
      --text-faint: #7a8faa;
      --border: #243d5c;
      --accent: #e8c676;
      --accent-soft: #2a3f5c;
      --hero-from: #0f1f3d;
      --hero-to: #152d4a;
      --modal-overlay: rgba(0, 0, 0, 0.65);
      --pill-bg: #1e3d63;
      --pill-active: #e8c676;
      --pill-active-text: #0a1528;
      --nav-bg: rgba(10, 21, 40, 0.94);
      --shadow: 0 1px 3px rgba(0,0,0,0.25);
      --code-bg: #1e3d63;
    }
    * { transition: background-color 0.2s ease, border-color 0.2s ease, color 0.15s ease; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
    body { font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--text); }
    .modal-open { overflow: hidden; }
    .card-btn:focus-visible, .icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .modal-panel { transform: translateY(1rem); opacity: 0; transition: transform 0.25s ease, opacity 0.25s ease; }
    .modal-panel.open { transform: translateY(0); opacity: 1; }
    .modal-backdrop { opacity: 0; transition: opacity 0.25s ease; }
    .modal-backdrop.open { opacity: 1; }
    .more-sheet { transform: translateY(100%); transition: transform 0.3s ease; }
    .more-sheet.open { transform: translateY(0); }
    .more-backdrop { opacity: 0; transition: opacity 0.25s ease; }
    .more-backdrop.open { opacity: 1; }
    .theme-pill { background: var(--pill-bg); }
    .theme-pill button[aria-pressed="true"] { background: var(--pill-active); color: var(--pill-active-text); }
    .day-tint-0 { background: color-mix(in srgb, #3a6a9f 8%, var(--surface)); }
    .day-tint-1 { background: color-mix(in srgb, #c4922e 10%, var(--surface)); }
    .day-tint-2 { background: color-mix(in srgb, #2d8a5e 8%, var(--surface)); }
    .day-tint-3 { background: color-mix(in srgb, #7c5cbf 8%, var(--surface)); }
    .day-tint-4 { background: color-mix(in srgb, #c45c2e 8%, var(--surface)); }
    .day-tint-5 { background: color-mix(in srgb, #5a6a80 8%, var(--surface)); }
    [data-theme="dark"] .day-tint-0 { background: color-mix(in srgb, #3a6a9f 18%, var(--surface)); }
    [data-theme="dark"] .day-tint-1 { background: color-mix(in srgb, #c4922e 15%, var(--surface)); }
    [data-theme="dark"] .day-tint-2 { background: color-mix(in srgb, #2d8a5e 15%, var(--surface)); }
    [data-theme="dark"] .day-tint-3 { background: color-mix(in srgb, #7c5cbf 15%, var(--surface)); }
    [data-theme="dark"] .day-tint-4 { background: color-mix(in srgb, #c45c2e 15%, var(--surface)); }
    [data-theme="dark"] .day-tint-5 { background: color-mix(in srgb, #5a6a80 15%, var(--surface)); }

    function getTheme() {
      return localStorage.getItem('aceya-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    }
    function setTheme(t) {
      document.documentElement.dataset.theme = t;
      localStorage.setItem('aceya-theme', t);
      $('#meta-theme').content = t === 'dark' ? '#0a1528' : '#0f1f3d';
      renderHeaderControls();
    }

    // ── Helpers ────────────────────────────────────────────────────────────────
    function parseDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d);
    }
    function getDayLabel(dateStr) {
      return parseDate(dateStr).toLocaleDateString('en-US', { weekday: 'long' });
    }
    function todayStr() {
      const n = new Date();
      return `${n.getFullYear()}-${String(n.getMonth() + 1).padStart(2, '0')}-${String(n.getDate()).padStart(2, '0')}`;
    }
    function getDressCat(block) {
      return CONFERENCE_DATA.dressCodeCategories[block.dressCodeCategory];
    }
    function getRules(block) {
      return (block.specificRules || []).filter(Boolean);
    }

    function getAllEvents() {
      return CONFERENCE_DATA.schedule.flatMap((day, dayIdx) =>
        day.blocks.map((block, blockIdx) => ({ day, dayIdx, block, blockIdx }))
      );
    }

    function parseBlockHour(time) {
      const m = time.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
      if (!m) return null;
      let h = parseInt(m[1], 10);
      if (m[3].toUpperCase() === 'PM' && h !== 12) h += 12;
      if (m[3].toUpperCase() === 'AM' && h === 12) h = 0;
      return h;
    }

    function getNextEvent() {
      const now = new Date();
      const phase = getPhase();
      const events = getAllEvents().filter((e) => e.block.time !== '—');

      if (phase === 'before') return events[0];
      if (phase === 'after') return events[events.length - 1];

      const ts = todayStr();
      const hour = now.getHours();
      const minute = now.getMinutes();
      const nowMins = hour * 60 + minute;

      const todayEvents = events.filter((e) => e.day.date === ts);
      if (!todayEvents.length) {
        const future = events.find((e) => e.day.date > ts);
        return future || events[events.length - 1];
      }

      for (const ev of todayEvents) {
        const startH = parseBlockHour(ev.block.time);
        if (startH !== null && startH * 60 > nowMins) return ev;
      }
      const tomorrow = events.find((e) => e.day.date > ts);
      return tomorrow || todayEvents[todayEvents.length - 1];
    }

    function getPhase() {
      const t = new Date(); t.setHours(0, 0, 0, 0);
      const s = parseDate(CONFERENCE_DATA.conference.dateStart);
      const e = parseDate(CONFERENCE_DATA.conference.dateEnd); e.setHours(23, 59, 59, 999);
      if (t < s) return 'before';
      if (t > e) return 'after';
      return 'during';
    }

        ? `<ul class="mt-1.5 space-y-0.5 ${compact ? 'text-xs' : 'text-sm'}">${rules.map((r) => `<li class="flex gap-1.5"><span style="color:var(--accent)">•</span>${r}</li>`).join('')}</ul>`
        : '';
      const guideHtml = compact ? '' : `<ul class="mt-2 space-y-0.5 text-sm">${c.guidelines.map((g) => `<li class="flex gap-1.5"><span style="color:var(--accent)">✓</span>${g}</li>`).join('')}</ul><p class="mt-2 text-xs" style="color:var(--text-faint)"><strong>Avoid:</strong> ${c.avoid}</p>`;
      const bg = onDark ? 'rgba(255,255,255,0.08)' : 'var(--accent-soft)';
      const border = onDark ? 'rgba(255,255,255,0.12)' : 'transparent';
      return `
        <div class="rounded-xl p-3 ${compact ? '' : 'mt-3'}" style="background:${bg};border:1px solid ${border}">
          <p class="text-[10px] font-bold uppercase tracking-wider" style="color:var(--accent)">What to wear</p>
          <p class="font-semibold ${compact ? 'text-sm' : 'text-base'} mt-0.5">${c.label}</p>
          ${guideHtml}
          ${rules.length && compact ? `<p class="text-[10px] font-bold uppercase tracking-wider mt-2" style="color:var(--accent)">Notes</p>` : ''}
          ${rulesHtml}
        </div>`;
    }

    function eventModalBody(block, day) {
      const loc = block.location || CONFERENCE_DATA.conference.defaultVenue;
      return `
        <p class="text-sm font-semibold" style="color:var(--accent)">${block.time}</p>
        <p class="mt-3 flex items-start gap-2 text-sm font-medium">
          <svg class="w-4 h-4 shrink-0 mt-0.5" style="color:var(--accent)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          ${loc}
        </p>
        <p class="mt-3">${block.detail}</p>
        ${dressBlock(block)}`;
    }

    // ── Modals ─────────────────────────────────────────────────────────────────
    function openModal({ eyebrow, title, body }) {
      lastFocus = document.activeElement;
      $('#modal-eyebrow').textContent = eyebrow || '';
      $('#modal-eyebrow').classList.toggle('hidden', !eyebrow);
      $('#modal-title').textContent = title;
      $('#modal-body').innerHTML = body;
      $('#modal-root').classList.remove('hidden');
      document.body.classList.add('modal-open');
      requestAnimationFrame(() => {
        $('#modal-backdrop').classList.add('open');
        $('#modal-panel').classList.add('open');
      });
      $('#modal-close').focus();
    }
    function closeModal() {
      $('#modal-backdrop').classList.remove('open');
      $('#modal-panel').classList.remove('open');
      setTimeout(() => {
        $('#modal-root').classList.add('hidden');
        document.body.classList.remove('modal-open');
        lastFocus?.focus();
      }, 250);
    }

    function openMore() {
      $('#more-body').innerHTML = renderMoreContent();
      bindMoreEvents();
      $('#more-root').classList.remove('hidden');
      document.body.classList.add('modal-open');
      requestAnimationFrame(() => {
        $('#more-backdrop').classList.add('open');
        $('#more-sheet').classList.add('open');
      });
      $('#nav-more').style.color = 'var(--accent)';
      $('#nav-home').style.color = 'var(--text-muted)';
    }
    function closeMore() {
      $('#more-backdrop').classList.remove('open');
      $('#more-sheet').classList.remove('open');
      setTimeout(() => {
        $('#more-root').classList.add('hidden');
        if ($('#modal-root').classList.contains('hidden')) document.body.classList.remove('modal-open');
      }, 300);
      $('#nav-home').style.color = 'var(--accent)';
      $('#nav-more').style.color = 'var(--text-muted)';
    }

    // ── Render ─────────────────────────────────────────────────────────────────
    function renderHeaderControls() {
      const theme = getTheme();
      const el = $('#header-controls');
      if (!el) return;
      el.innerHTML = `
        <div class="theme-pill flex rounded-full p-0.5">
          <button type="button" data-theme-set="light" aria-pressed="${theme === 'light'}" aria-label="Day mode"
            class="flex items-center justify-center w-9 h-9 rounded-full">
            <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
          </button>
          <button type="button" data-theme-set="dark" aria-pressed="${theme === 'dark'}" aria-label="Night mode"
            class="flex items-center justify-center w-9 h-9 rounded-full">
            <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
          </button>
        </div>`;
      el.querySelectorAll('[data-theme-set]').forEach((btn) => {
        btn.addEventListener('click', () => setTheme(btn.dataset.themeSet));
      });
    }

    function renderWhatsNext() {
      const next = getNextEvent();
      const { day, block } = next;
      const phase = getPhase();
      const badge = phase === 'before' ? 'Upcoming' : phase === 'after' ? 'Ended' : day.date === todayStr() ? 'Up next' : getDayLabel(day.date);
      const loc = block.location || CONFERENCE_DATA.conference.defaultVenue;

      return `
        <section class="mb-5" aria-labelledby="whats-next">
          <div class="rounded-2xl p-5 text-white overflow-hidden" style="background:linear-gradient(145deg,var(--hero-from),var(--hero-to));box-shadow:var(--shadow)">
            <div class="flex items-center justify-between mb-3">
              <h2 id="whats-next" class="text-xs font-bold uppercase tracking-widest opacity-80">What's Next</h2>
              <span class="text-[10px] font-bold uppercase tracking-wide px-2 py-0.5 rounded-md" style="background:rgba(255,255,255,0.15)">${badge}</span>
            </div>
            <p class="text-2xl font-bold leading-tight">${block.title}</p>
            <p class="mt-1 text-sm opacity-75">${block.time} · ${getDayLabel(day.date)}</p>
            <p class="mt-3 text-sm opacity-90 leading-snug">${block.detail}</p>
            <p class="mt-3 flex items-start gap-2 text-sm font-medium" style="color:var(--accent)">
              <svg class="w-4 h-4 shrink-0 mt-0.5 text-white opacity-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              <span class="text-white">${loc}</span>
            </p>
            ${dressBlock(block, { compact: true, onDark: true })}
            <button type="button" data-action="next-detail" class="mt-4 w-full min-h-[44px] rounded-xl text-sm font-bold" style="background:var(--accent);color:#0a1528">
              Full details
            </button>
          </div>
        </section>`;
    }

    function renderSchedule() {
      const days = CONFERENCE_DATA.schedule.map((day, dayIdx) => {
        const tint = `day-tint-${dayIdx % 6}`;
        const events = day.blocks
          .filter((b) => b.time !== '—')
          .map((block, blockIdx) => `
            <button type="button" data-action="event" data-day="${dayIdx}" data-block="${blockIdx}"
              class="card-btn w-full text-left p-4 rounded-xl min-h-[56px] active:scale-[0.99] transition-transform"
              style="background:var(--surface-elevated);border:1px solid var(--border);box-shadow:var(--shadow)"
              aria-label="${block.title}, ${block.time}">
              <div class="flex items-start justify-between gap-2">
                <div class="min-w-0 flex-1">
                  <p class="text-xs font-medium" style="color:var(--text-faint)">${block.time}</p>
                  <p class="font-semibold mt-0.5 leading-snug">${block.title}</p>
                  <p class="text-xs mt-1 truncate" style="color:var(--text-muted)">${block.location || CONFERENCE_DATA.conference.defaultVenue}</p>
                </div>
                <div class="shrink-0 flex flex-col items-end gap-1">
                  ${dressBadge(block)}
                  <svg class="w-4 h-4" style="color:var(--text-faint)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </div>
              </div>
            </button>`).join('');

        return `
          <div class="rounded-2xl overflow-hidden ${tint}" style="border:1px solid var(--border)">
            <div class="px-4 py-3" style="border-bottom:1px solid var(--border)">
              <p class="text-xs font-bold uppercase tracking-wider" style="color:var(--accent)">${getDayLabel(day.date)} · ${day.date.slice(5).replace('-', '/')}</p>
              <p class="font-bold text-lg mt-0.5">${day.title}</p>
            </div>
            <div class="p-3 space-y-2">${events}</div>
          </div>`;
      }).join('');

      return `
        <section aria-labelledby="schedule-h">
          <h2 id="schedule-h" class="text-sm font-bold uppercase tracking-wider mb-3" style="color:var(--text-muted)">Schedule</h2>
          <div class="space-y-4">${days}</div>
        </section>`;
    }

    function renderMoreContent() {
      const dressCards = CONFERENCE_DATA.dressCode.map((item, i) => `
        <button type="button" data-more-action="dress" data-index="${i}" class="card-btn w-full text-left p-4 rounded-xl min-h-[52px]" style="background:var(--surface-elevated);border:1px solid var(--border)">
          <p class="font-semibold">${item.title}</p>
          <p class="text-sm mt-0.5" style="color:var(--text-muted)">${item.summary}</p>
        </button>`).join('');

      const mapRows = CONFERENCE_DATA.eventTypeDressMap.map((row) => {
        const evt = CONFERENCE_DATA.eventTypes[row.eventType];
        const cat = CONFERENCE_DATA.dressCodeCategories[row.dressCodeCategory];
        return `<div class="flex items-center justify-between gap-3 py-2.5 text-sm" style="border-bottom:1px solid var(--border)">
          <div><span class="font-medium">${evt?.label}</span><span class="block text-xs" style="color:var(--text-faint)">${row.note}</span></div>
          <span class="text-xs font-bold shrink-0" style="color:var(--accent)">${cat?.shortLabel}</span>
        </div>`;
      }).join('');

      const infoCards = CONFERENCE_DATA.keyInfo.map((item, i) => `
        <button type="button" data-more-action="info" data-index="${i}" class="card-btn w-full text-left p-4 rounded-xl min-h-[52px]" style="background:var(--surface-elevated);border:1px solid var(--border)">
          <p class="font-semibold">${item.title}</p>
          <p class="text-sm mt-0.5" style="color:var(--text-muted)">${item.summary}</p>
        </button>`).join('');

      const links = CONFERENCE_DATA.quickLinks.map((link, i) => {
        if (link.url) {
          return `<a href="${link.url}" target="_blank" rel="noopener" class="flex items-center justify-between p-4 rounded-xl min-h-[52px]" style="background:var(--surface-elevated);border:1px solid var(--border)">
            <span class="font-semibold">${link.title}</span>
            <svg class="w-4 h-4" style="color:var(--accent)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          </a>`;
        }
        return `<button type="button" data-more-action="link" data-index="${i}" class="card-btn w-full text-left p-4 rounded-xl min-h-[52px]" style="background:var(--surface-elevated);border:1px solid var(--border)">
          <p class="font-semibold">${link.title}</p>
        </button>`;
      }).join('');

      return `
        <div>
          <h3 class="text-xs font-bold uppercase tracking-wider mb-2" style="color:var(--text-muted)">Dress Code</h3>
          <div class="space-y-2">${dressCards}</div>
          <div class="mt-4 rounded-xl p-3" style="background:var(--accent-soft)">
            <p class="text-xs font-bold uppercase tracking-wider mb-2" style="color:var(--accent)">Event type reference</p>
            ${mapRows}
          </div>
        </div>
        <div>
          <h3 class="text-xs font-bold uppercase tracking-wider mb-2" style="color:var(--text-muted)">Key Information</h3>
          <div class="space-y-2">${infoCards}</div>
        </div>
        <div>
          <h3 class="text-xs font-bold uppercase tracking-wider mb-2" style="color:var(--text-muted)">Resources</h3>
          <div class="space-y-2">${links}</div>
        </div>`;
    }

    function getDressModalContent(item) {
      if (item.detail) return item.detail;
      if (item.categoryId) {
        const c = CONFERENCE_DATA.dressCodeCategories[item.categoryId];
        return `<p class="font-semibold">${c.label}</p><ul class="list-disc pl-5 mt-2 space-y-1">${c.guidelines.map((g) => `<li>${g}</li>`).join('')}</ul><p class="mt-3 text-sm" style="color:var(--text-faint)"><strong>Avoid:</strong> ${c.avoid}</p>`;
      }
      return '<p>Not available.</p>';
    }

    function render() {
      const c = CONFERENCE_DATA.conference;
      app.innerHTML = `
        <header class="sticky top-0 z-20 px-4 pt-4 pb-3 backdrop-blur-md" style="background:color-mix(in srgb, var(--bg) 88%, transparent)">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <h1 class="text-lg font-bold leading-tight">${c.name}</h1>
              <p class="text-xs mt-0.5" style="color:var(--text-muted)">${c.subtitle} · ${c.dates} · ${c.location}</p>
            </div>
            <div id="header-controls" class="shrink-0 pt-0.5"></div>
          </div>
        </header>
        <main id="main" class="px-4 pt-2">
          ${renderWhatsNext()}
          ${renderSchedule()}
          <footer class="text-center py-6 mt-4" style="border-top:1px solid var(--border)">
            <p class="text-xs" style="color:var(--text-faint)">Last updated: ${CONFERENCE_DATA.lastUpdated}</p>
            <p class="text-xs mt-1" style="color:var(--text-faint)">Edit <code class="px-1 rounded text-[10px]" style="background:var(--code-bg)">CONFERENCE_DATA</code> in index.html</p>
          </footer>
        </main>`;
      renderHeaderControls();
      bindMainEvents();
    }

    function bindMainEvents() {
      app.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        if (btn.dataset.action === 'next-detail') {
          const next = getNextEvent();
          openModal({
            eyebrow: `${getDayLabel(next.day.date)} · ${next.block.time}`,
            title: next.block.title,
            body: eventModalBody(next.block, next.day),
          });
        }
        if (btn.dataset.action === 'event') {
          const day = CONFERENCE_DATA.schedule[parseInt(btn.dataset.day, 10)];
          const block = day.blocks[parseInt(btn.dataset.block, 10)];
          openModal({
            eyebrow: getDayLabel(day.date),
            title: block.title,
            body: eventModalBody(block, day),
          });
        }
      });
    }

    function bindMoreEvents() {
      $('#more-body').addEventListener('click', (e) => {
        const btn = e.target.closest('[data-more-action]');
        if (!btn) return;
        const idx = parseInt(btn.dataset.index, 10);
        if (btn.dataset.moreAction === 'dress') {
          const item = CONFERENCE_DATA.dressCode[idx];
          closeMore();
          setTimeout(() => openModal({ eyebrow: 'Dress Code', title: item.title, body: getDressModalContent(item) }), 320);
        }
        if (btn.dataset.moreAction === 'info') {
          const item = CONFERENCE_DATA.keyInfo[idx];
          closeMore();
          setTimeout(() => openModal({ eyebrow: 'Info', title: item.title, body: item.detail }), 320);
        }
        if (btn.dataset.moreAction === 'link') {
          const item = CONFERENCE_DATA.quickLinks[idx];
          closeMore();
          setTimeout(() => openModal({ eyebrow: 'Resources', title: item.title, body: item.detail }), 320);
        }
      });
    }

    // ── Init ───────────────────────────────────────────────────────────────────
    setTheme(getTheme());
    $('#modal-close').addEventListener('click', closeModal);
    $('#modal-backdrop').addEventListener('click', closeModal);
    $('#more-close').addEventListener('click', closeMore);
    $('#more-backdrop').addEventListener('click', closeMore);
    $('#nav-more').addEventListener('click', openMore);
    $('#nav-home').addEventListener('click', () => { closeMore(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      if (!$('#modal-root').classList.contains('hidden')) closeModal();
      else if (!$('#more-root').classList.contains('hidden')) closeMore();
    });

    render();
    setInterval(() => {
      const section = document.querySelector('[aria-labelledby="whats-next"]');
      if (section) section.outerHTML = renderWhatsNext();
    }, 60000);
  </script>
</body>
</html>
