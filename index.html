<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="ACEYA Youth Conference — Detroit, July 3–8, 2026">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root, [data-theme="light"] {
      --bg-base: #e8edf5;
      --bg-orb-1: rgba(58, 106, 159, 0.22);
      --bg-orb-2: rgba(196, 146, 46, 0.16);
      --bg-orb-3: rgba(255, 255, 255, 0.9);
      --text: #0f1f3d;
      --text-muted: #4a5d78;
      --text-faint: #7a8da8;
      --accent: #b8862a;
      --accent-glow: rgba(196, 146, 46, 0.35);
      --glass: rgba(255, 255, 255, 0.58);
      --glass-strong: rgba(255, 255, 255, 0.78);
      --glass-border: rgba(255, 255, 255, 0.85);
      --glass-edge: rgba(15, 31, 61, 0.06);
      --glass-inset: inset 0 1px 0 rgba(255,255,255,0.95), inset 0 -1px 0 rgba(15,31,61,0.04);
      --glass-shadow: 0 8px 32px rgba(15, 31, 61, 0.07), 0 2px 8px rgba(15, 31, 61, 0.04);
      --glass-shadow-lg: 0 20px 50px rgba(15, 31, 61, 0.12);
      --hero-glass: rgba(15, 31, 61, 0.72);
      --modal-overlay: rgba(15, 31, 61, 0.45);
      --pill-bg: rgba(255,255,255,0.45);
      --pill-active: #0f1f3d;
      --pill-active-text: #f8fafc;
      --nav-glass: rgba(255,255,255,0.62);
      --dress-tint: rgba(196, 146, 46, 0.12);
      --code-bg: rgba(15,31,61,0.06);
      --day-accents: #3a6a9f, #b8862a, #2d7a5a, #6b5b95, #c45c3a, #5a6a80;
    }
    [data-theme="dark"] {
      --bg-base: #070f1c;
      --bg-orb-1: rgba(58, 106, 159, 0.28);
      --bg-orb-2: rgba(232, 198, 118, 0.14);
      --bg-orb-3: rgba(21, 45, 74, 0.5);
      --text: #eef3fa;
      --text-muted: #a8b8d0;
      --text-faint: #6a7f9a;
      --accent: #e8c676;
      --accent-glow: rgba(232, 198, 118, 0.25);
      --glass: rgba(21, 45, 74, 0.55);
      --glass-strong: rgba(26, 53, 88, 0.72);
      --glass-border: rgba(255, 255, 255, 0.14);
      --glass-edge: rgba(255, 255, 255, 0.08);
      --glass-inset: inset 0 1px 0 rgba(255,255,255,0.12), inset 0 -1px 0 rgba(0,0,0,0.15);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.28);
      --glass-shadow-lg: 0 24px 60px rgba(0, 0, 0, 0.45);
      --hero-glass: rgba(10, 21, 40, 0.82);
      --modal-overlay: rgba(0, 0, 0, 0.62);
      --pill-bg: rgba(30, 61, 99, 0.6);
      --pill-active: #e8c676;
      --pill-active-text: #0a1528;
      --nav-glass: rgba(10, 21, 40, 0.72);
      --dress-tint: rgba(232, 198, 118, 0.1);
      --code-bg: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: var(--bg-base);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    .font-display { font-family: 'Cormorant Garamond', Georgia, serif; }

    .ambient {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .ambient::before, .ambient::after {
      content: ''; position: absolute; border-radius: 50%; filter: blur(80px);
    }
    .ambient::before {
      width: 70vw; height: 70vw; top: -20%; left: -15%;
      background: var(--bg-orb-1);
    }
    .ambient::after {
      width: 55vw; height: 55vw; bottom: 10%; right: -20%;
      background: var(--bg-orb-2);
    }
    .ambient-orb {
      position: absolute; width: 40vw; height: 40vw; border-radius: 50%;
      filter: blur(60px); background: var(--bg-orb-3);
      top: 40%; left: 30%; opacity: 0.6;
    }

    .glass {
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow), var(--glass-inset);
    }
    .glass-strong {
      background: var(--glass-strong);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow-lg), var(--glass-inset);
    }
    .glass-hero {
      background: var(--hero-glass);
      backdrop-filter: blur(28px) saturate(1.3);
      -webkit-backdrop-filter: blur(28px) saturate(1.3);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: var(--glass-shadow-lg), inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .card-btn { transition: transform 0.18s ease, box-shadow 0.18s ease; }
    .card-btn:active { transform: scale(0.985); }
    .card-btn:focus-visible, .icon-btn:focus-visible, .nav-tab:focus-visible {
      outline: 2px solid var(--accent); outline-offset: 2px;
    }

    .modal-panel { transform: translateY(24px) scale(0.97); opacity: 0; transition: transform 0.32s cubic-bezier(.22,1,.36,1), opacity 0.28s ease; }
    .modal-panel.open { transform: translateY(0) scale(1); opacity: 1; }
    .modal-backdrop { opacity: 0; transition: opacity 0.28s ease; }
    .modal-backdrop.open { opacity: 1; }
    .modal-open { overflow: hidden; }

    .tab-panel { animation: fadeUp 0.35s cubic-bezier(.22,1,.36,1) both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .nav-tab.active {
      color: var(--accent);
      background: var(--glass-strong);
      box-shadow: 0 0 20px var(--accent-glow), var(--glass-inset);
      border: 1px solid var(--glass-border);
    }

    .theme-pill { background: var(--pill-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); }
    .theme-pill button { transition: all 0.2s ease; }
    .theme-pill button[aria-pressed="true"] {
      background: var(--pill-active); color: var(--pill-active-text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .event-card.is-next { border-color: var(--accent) !important; box-shadow: 0 0 0 1px var(--accent-glow), var(--glass-shadow), var(--glass-inset); }
    .event-time { font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }

    @media (prefers-reduced-motion: reduce) {
      *, .tab-panel, .modal-panel { animation: none !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>

    const $ = (s) => document.querySelector(s);

    // ── Theme ──────────────────────────────────────────────────────────────────
    function getTheme() {
      return localStorage.getItem('aceya-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    }
    function setTheme(t) {
      document.documentElement.dataset.theme = t;
      localStorage.setItem('aceya-theme', t);
      $('#meta-theme').content = t === 'dark' ? '#070f1c' : '#0f1f3d';
      renderHeaderControls();
    }

    // ── Date / schedule helpers ───────────────────────────────────────────────
    function parseDate(str) { const [y,m,d] = str.split('-').map(Number); return new Date(y,m-1,d); }
    function getDayLabel(d) { return parseDate(d).toLocaleDateString('en-US', { weekday: 'long' }); }
    function todayStr() { const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; }
    function getPhase() {
      const t = new Date(); t.setHours(0,0,0,0);
      const s = parseDate(CONFERENCE_DATA.conference.dateStart);
      const e = parseDate(CONFERENCE_DATA.conference.dateEnd); e.setHours(23,59,59,999);
      if (t < s) return 'before'; if (t > e) return 'after'; return 'during';
    }
    function getTodayDay() {
      const phase = getPhase();
      if (phase === 'before') return { day: CONFERENCE_DATA.schedule[0], dayIdx: 0 };
      if (phase === 'after') { const i = CONFERENCE_DATA.schedule.length - 1; return { day: CONFERENCE_DATA.schedule[i], dayIdx: i }; }
      const ts = todayStr();
      const idx = CONFERENCE_DATA.schedule.findIndex((d) => d.date === ts);
      const i = idx >= 0 ? idx : 0;
      return { day: CONFERENCE_DATA.schedule[i], dayIdx: i };
    }
    function getDressCat(b) { return CONFERENCE_DATA.dressCodeCategories[b.dressCodeCategory]; }
    function getRules(b) { return (b.specificRules || []).filter(Boolean); }
    function getAllEvents() {
      return CONFERENCE_DATA.schedule.flatMap((day, dayIdx) =>
        day.blocks.filter((b) => b.time !== '—').map((block, blockIdx) => ({ day, dayIdx, block, blockIdx }))
      );
    }
    function parseBlockHour(time) {
      const m = time.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
      if (!m) return null;
      let h = parseInt(m[1],10);
      if (m[3].toUpperCase()==='PM' && h!==12) h+=12;
      if (m[3].toUpperCase()==='AM' && h===12) h=0;
      return h;
    }
    function getNextEvent() {
      const now = new Date(); const phase = getPhase();
      const events = getAllEvents();
      if (phase === 'before') return events[0];
      if (phase === 'after') return events[events.length - 1];
      const ts = todayStr(); const nowMins = now.getHours()*60 + now.getMinutes();
      const todayEv = events.filter((e) => e.day.date === ts);
      if (!todayEv.length) return events.find((e) => e.day.date > ts) || events[events.length-1];
      for (const ev of todayEv) {
        const h = parseBlockHour(ev.block.time);
        if (h !== null && h*60 > nowMins) return ev;
      }
      return events.find((e) => e.day.date > ts) || todayEv[todayEv.length-1];
    }

    // ── UI fragments ─────────────────────────────────────────────────────────
    function dressBadge(block) {
      const c = getDressCat(block); if (!c) return '';
      return `<span class="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-full" style="background:var(--dress-tint);color:var(--accent);border:1px solid var(--glass-edge)">${c.shortLabel}</span>`;
    }

    function dressBlock(block, { compact = false, hero = false } = {}) {
      const c = getDressCat(block); const rules = getRules(block); if (!c) return '';
      const rulesHtml = rules.length ? `<ul class="mt-2 space-y-1 ${compact?'text-xs':'text-sm'}">${rules.map(r=>`<li class="flex gap-2"><span style="color:var(--accent)">·</span>${r}</li>`).join('')}</ul>` : '';
      const guideHtml = compact ? '' : `<ul class="mt-2 space-y-1 text-sm">${c.guidelines.map(g=>`<li class="flex gap-2"><span style="color:var(--accent)">✓</span>${g}</li>`).join('')}</ul><p class="mt-2 text-xs" style="color:var(--text-faint)">Avoid: ${c.avoid}</p>`;
      const bg = hero ? 'rgba(255,255,255,0.08)' : 'var(--dress-tint)';
      const border = hero ? 'rgba(255,255,255,0.14)' : 'var(--glass-edge)';
      const labelColor = hero ? 'rgba(232,198,118,0.9)' : 'var(--accent)';
      const textColor = hero ? 'rgba(255,255,255,0.92)' : 'var(--text)';
      return `<div class="rounded-2xl p-3.5 mt-3" style="background:${bg};border:1px solid ${border}">
        <p class="text-[10px] font-bold uppercase tracking-[0.12em]" style="color:${labelColor}">What to wear</p>
        <p class="font-semibold mt-0.5 ${compact?'text-sm':'text-base'}" style="color:${textColor}">${c.label}</p>
        ${guideHtml}${rules.length && compact ? `<p class="text-[10px] font-bold uppercase tracking-wider mt-2" style="color:${labelColor}">Notes</p>` : ''}${rulesHtml}
      </div>`;
    }

    function eventCard(block, dayIdx, blockIdx, { isNext = false } = {}) {
      const loc = block.location || CONFERENCE_DATA.conference.defaultVenue;
      return `<button type="button" data-action="event" data-day="${dayIdx}" data-block="${blockIdx}"
        class="card-btn event-card glass w-full text-left p-4 rounded-2xl min-h-[60px] ${isNext ? 'is-next' : ''}"
        aria-label="${block.title}, ${block.time}">
        <div class="flex justify-between gap-3 items-start">
          <div class="min-w-0 flex-1">
            <p class="event-time text-xs font-medium" style="color:var(--text-faint)">${block.time}</p>
            <p class="font-semibold mt-1 leading-snug">${block.title}</p>
            <p class="text-xs mt-1.5 truncate" style="color:var(--text-muted)">${loc}</p>
          </div>
          <div class="shrink-0 flex flex-col items-end gap-2 pt-0.5">
            ${dressBadge(block)}
            <svg class="w-4 h-4" style="color:var(--text-faint)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </div>
        </div>
      </button>`;
    }

    function eventModalBody(block) {
      const loc = block.location || CONFERENCE_DATA.conference.defaultVenue;
      return `<p class="text-sm font-semibold event-time" style="color:var(--accent)">${block.time}</p>
        <p class="mt-4 flex items-start gap-2.5 text-sm font-medium" style="color:var(--text)">
          <svg class="w-4 h-4 shrink-0 mt-0.5" style="color:var(--accent)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>${loc}
        </p><p class="mt-4">${block.detail}</p>${dressBlock(block)}`;
    }

    // ── Tab views ─────────────────────────────────────────────────────────────
    function renderWhatsNext() {
      const next = getNextEvent();
      const { day, block } = next;
      const loc = block.location || CONFERENCE_DATA.conference.defaultVenue;
      const badge = getPhase()==='before' ? 'Upcoming' : getPhase()==='after' ? 'Ended' : day.date===todayStr() ? 'Up next' : getDayLabel(day.date);

      return `<section class="mb-6" aria-labelledby="whats-next">
        <div class="glass-hero rounded-3xl p-5 text-white relative overflow-hidden">
          <div class="absolute top-0 right-0 w-32 h-32 rounded-full opacity-20" style="background:var(--accent);filter:blur(40px)" aria-hidden="true"></div>
          <div class="relative">
            <div class="flex items-center justify-between mb-4">
              <h2 id="whats-next" class="text-[10px] font-bold uppercase tracking-[0.16em] text-white/70">What's Next</h2>
              <span class="text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-full glass" style="color:var(--accent)">${badge}</span>
            </div>
            <h3 class="font-display text-3xl font-semibold leading-[1.1] tracking-tight">${block.title}</h3>
            <p class="event-time mt-2 text-sm text-white/65">${block.time}</p>
            <p class="mt-3 text-sm text-white/80 leading-relaxed">${block.detail}</p>
            <p class="mt-3 flex items-start gap-2 text-sm text-white/75">
              <svg class="w-4 h-4 shrink-0 mt-0.5 text-white/60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>${loc}
            </p>
            ${dressBlock(block, { compact: true, hero: true })}
            <button type="button" data-action="next-detail" class="mt-4 w-full min-h-[48px] rounded-2xl text-sm font-bold tracking-wide" style="background:var(--accent);color:#0a1528">Full details</button>
          </div>
        </div>
      </section>`;
    }

    function renderTodayTab() {
      const { day, dayIdx } = getTodayDay();
      const next = getNextEvent();
      const blocks = day.blocks.filter((b) => b.time !== '—');
      const phase = getPhase();
      const dayHeader = phase === 'during' && day.date === todayStr()
        ? `Today · ${getDayLabel(day.date)}`
        : `${getDayLabel(day.date)} · ${day.date.slice(5).replace('-','/')}`;

      const agenda = blocks.map((block, blockIdx) => {
        const isNext = next.dayIdx === dayIdx && next.blockIdx === blockIdx;
        return eventCard(block, dayIdx, blockIdx, { isNext });
      }).join('');

      return `<div class="tab-panel">
        ${renderWhatsNext()}
        <section aria-labelledby="today-agenda">
          <div class="flex items-end justify-between mb-3">
            <div>
              <h2 id="today-agenda" class="font-display text-xl font-semibold">${day.title}</h2>
              <p class="text-xs mt-0.5 font-medium" style="color:var(--text-muted)">${dayHeader}</p>
            </div>
            <span class="text-xs font-bold px-2 py-1 rounded-full glass" style="color:var(--accent)">${blocks.length} events</span>
          </div>
          <div class="space-y-2.5">${agenda}</div>
        </section>
      </div>`;
    }

    function renderScheduleTab() {
      const dayAccents = ['#3a6a9f','#b8862a','#2d7a5a','#6b5b95','#c45c3a','#5a6a80'];
      const days = CONFERENCE_DATA.schedule.map((day, dayIdx) => {
        const accent = dayAccents[dayIdx % dayAccents.length];
        const events = day.blocks.filter((b) => b.time !== '—').map((block, blockIdx) => eventCard(block, dayIdx, blockIdx)).join('');
        return `<div class="glass rounded-3xl overflow-hidden">
          <div class="px-4 py-4 relative" style="border-bottom:1px solid var(--glass-edge)">
            <div class="absolute left-0 top-3 bottom-3 w-1 rounded-r-full" style="background:${accent};opacity:0.85" aria-hidden="true"></div>
            <p class="text-[10px] font-bold uppercase tracking-[0.14em] pl-3" style="color:${accent}">${getDayLabel(day.date)} · Jul ${parseInt(day.date.slice(8),10)}</p>
            <p class="font-display text-xl font-semibold mt-1 pl-3">${day.title}</p>
          </div>
          <div class="p-3 space-y-2">${events}</div>
        </div>`;
      }).join('');

      return `<div class="tab-panel">
        <h2 class="font-display text-2xl font-semibold mb-1">Full Schedule</h2>
        <p class="text-sm mb-5" style="color:var(--text-muted)">July 3–8 · Detroit</p>
        <div class="space-y-4">${days}</div>
      </div>`;
    }

    function renderMoreTab() {
      const dressCards = CONFERENCE_DATA.dressCode.map((item,i) => `
        <button type="button" data-more-action="dress" data-index="${i}" class="card-btn glass w-full text-left p-4 rounded-2xl min-h-[52px]">
          <p class="font-semibold">${item.title}</p><p class="text-sm mt-0.5" style="color:var(--text-muted)">${item.summary}</p>
        </button>`).join('');

      const mapRows = CONFERENCE_DATA.eventTypeDressMap.map((row) => {
        const evt = CONFERENCE_DATA.eventTypes[row.eventType];
        const cat = CONFERENCE_DATA.dressCodeCategories[row.dressCodeCategory];
        return `<div class="flex items-center justify-between gap-3 py-2.5 text-sm" style="border-bottom:1px solid var(--glass-edge)">
          <div><span class="font-medium">${evt?.label}</span><span class="block text-xs" style="color:var(--text-faint)">${row.note}</span></div>
          <span class="text-[10px] font-bold uppercase shrink-0" style="color:var(--accent)">${cat?.shortLabel}</span>
        </div>`;
      }).join('');

      const infoCards = CONFERENCE_DATA.keyInfo.map((item,i) => `
        <button type="button" data-more-action="info" data-index="${i}" class="card-btn glass w-full text-left p-4 rounded-2xl min-h-[52px]">
          <p class="font-semibold">${item.title}</p><p class="text-sm mt-0.5" style="color:var(--text-muted)">${item.summary}</p>
        </button>`).join('');

      const links = CONFERENCE_DATA.quickLinks.map((link,i) => link.url
        ? `<a href="${link.url}" target="_blank" rel="noopener" class="flex items-center justify-between glass p-4 rounded-2xl min-h-[52px]">
            <span class="font-semibold">${link.title}</span>
            <svg class="w-4 h-4" style="color:var(--accent)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          </a>`
        : `<button type="button" data-more-action="link" data-index="${i}" class="card-btn glass w-full text-left p-4 rounded-2xl min-h-[52px]"><p class="font-semibold">${link.title}</p></button>`
      ).join('');

      return `<div class="tab-panel">
        <h2 class="font-display text-2xl font-semibold mb-5">More</h2>
        <div class="space-y-6">
          <section><h3 class="text-[10px] font-bold uppercase tracking-[0.14em] mb-2.5" style="color:var(--text-muted)">Dress Code</h3>
            <div class="space-y-2">${dressCards}</div>
            <div class="glass rounded-2xl p-4 mt-3"><p class="text-[10px] font-bold uppercase tracking-wider mb-2" style="color:var(--accent)">Event type reference</p>${mapRows}</div>
          </section>
          <section><h3 class="text-[10px] font-bold uppercase tracking-[0.14em] mb-2.5" style="color:var(--text-muted)">Key Information</h3><div class="space-y-2">${infoCards}</div></section>
          <section><h3 class="text-[10px] font-bold uppercase tracking-[0.14em] mb-2.5" style="color:var(--text-muted)">Resources</h3><div class="space-y-2">${links}</div></section>
        </div>
      </div>`;
    }

    function renderTabContent() {
      if (currentTab === 'today') return renderTodayTab();
      if (currentTab === 'schedule') return renderScheduleTab();
      return renderMoreTab();
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.nav-tab').forEach((btn) => {
        const active = btn.dataset.tab === tab;
        btn.classList.toggle('active', active);
        btn.style.color = active ? '' : 'var(--text-muted)';
        btn.setAttribute('aria-current', active ? 'page' : null);
      });
      $('#tab-content').innerHTML = renderTabContent();
      bindTabEvents();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── Modal ────────────────────────────────────────────────────────────────
    function openModal({ eyebrow, title, body }) {
      lastFocus = document.activeElement;
      $('#modal-eyebrow').textContent = eyebrow || '';
      $('#modal-eyebrow').classList.toggle('hidden', !eyebrow);
      $('#modal-title').textContent = title;
      $('#modal-body').innerHTML = body;
      $('#modal-root').classList.remove('hidden');
      document.body.classList.add('modal-open');
      requestAnimationFrame(() => { $('#modal-backdrop').classList.add('open'); $('#modal-panel').classList.add('open'); });
      $('#modal-close').focus();
    }
    function closeModal() {
      $('#modal-backdrop').classList.remove('open');
      $('#modal-panel').classList.remove('open');
      setTimeout(() => { $('#modal-root').classList.add('hidden'); document.body.classList.remove('modal-open'); lastFocus?.focus(); }, 280);
    }
    function getDressModalContent(item) {
      if (item.detail) return item.detail;
      if (item.categoryId) {
        const c = CONFERENCE_DATA.dressCodeCategories[item.categoryId];
        return `<p class="font-semibold">${c.label}</p><ul class="list-disc pl-5 mt-2 space-y-1">${c.guidelines.map(g=>`<li>${g}</li>`).join('')}</ul><p class="mt-3 text-sm" style="color:var(--text-faint)">Avoid: ${c.avoid}</p>`;
      }
      return '<p>Not available.</p>';
    }

    // ── Shell render ─────────────────────────────────────────────────────────
    function renderHeaderControls() {
      const theme = getTheme();
      const el = $('#header-controls'); if (!el) return;
      el.innerHTML = `<div class="theme-pill flex rounded-full p-0.5">
        <button type="button" data-theme-set="light" aria-pressed="${theme==='light'}" aria-label="Day mode" class="flex items-center justify-center w-9 h-9 rounded-full">
          <svg class="w-[17px] h-[17px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </button>
        <button type="button" data-theme-set="dark" aria-pressed="${theme==='dark'}" aria-label="Night mode" class="flex items-center justify-center w-9 h-9 rounded-full">
          <svg class="w-[17px] h-[17px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
      </div>`;
      el.querySelectorAll('[data-theme-set]').forEach((btn) => btn.addEventListener('click', () => setTheme(btn.dataset.themeSet)));
    }

    function render() {
      const c = CONFERENCE_DATA.conference;
      app.innerHTML = `
        <header class="sticky top-0 z-20 px-5 pt-5 pb-3">
          <div class="glass rounded-2xl px-4 py-3.5 flex items-start justify-between gap-3">
            <div class="min-w-0 pt-0.5">
              <p class="text-[10px] font-bold uppercase tracking-[0.14em]" style="color:var(--accent)">${c.subtitle}</p>
              <h1 class="font-display text-2xl font-semibold leading-tight mt-0.5">${c.name}</h1>
              <p class="text-xs mt-1 font-medium" style="color:var(--text-muted)">${c.dates} · ${c.location}</p>
            </div>
            <div id="header-controls" class="shrink-0"></div>
          </div>
        </header>
        <main id="tab-content" class="px-5 pt-2 pb-4">${renderTabContent()}</main>
        <footer class="text-center px-5 py-6">
          <p class="text-[11px]" style="color:var(--text-faint)">Last updated ${CONFERENCE_DATA.lastUpdated}</p>
          <p class="text-[10px] mt-1" style="color:var(--text-faint)">Edit <code class="px-1 rounded" style="background:var(--code-bg)">CONFERENCE_DATA</code></p>
        </footer>`;
      renderHeaderControls();
      bindTabEvents();
    }

    function bindTabEvents() {
      const root = $('#tab-content');
      root.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        if (btn.dataset.action === 'next-detail') {
          const n = getNextEvent();
          openModal({ eyebrow: `${getDayLabel(n.day.date)} · ${n.block.time}`, title: n.block.title, body: eventModalBody(n.block) });
        }
        if (btn.dataset.action === 'event') {
          const day = CONFERENCE_DATA.schedule[parseInt(btn.dataset.day,10)];
          const block = day.blocks[parseInt(btn.dataset.block,10)];
          openModal({ eyebrow: getDayLabel(day.date), title: block.title, body: eventModalBody(block) });
        }
      });
      root.querySelectorAll('[data-more-action]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.index,10);
          if (btn.dataset.moreAction === 'dress') {
            const item = CONFERENCE_DATA.dressCode[idx];
            openModal({ eyebrow: 'Dress Code', title: item.title, body: getDressModalContent(item) });
          }
          if (btn.dataset.moreAction === 'info') {
            const item = CONFERENCE_DATA.keyInfo[idx];
            openModal({ eyebrow: 'Info', title: item.title, body: item.detail });
          }
          if (btn.dataset.moreAction === 'link') {
            const item = CONFERENCE_DATA.quickLinks[idx];
            openModal({ eyebrow: 'Resources', title: item.title, body: item.detail });
          }
        });
      });
    }

    function refreshToday() {
      if (currentTab === 'today') $('#tab-content').innerHTML = renderTodayTab(), bindTabEvents();
    }

    // ── Init ───────────────────────────────────────────────────────────────────
    setTheme(getTheme());
    document.querySelectorAll('.nav-tab').forEach((btn) => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
    $('#modal-close').addEventListener('click', closeModal);
    $('#modal-backdrop').addEventListener('click', closeModal);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !$('#modal-root').classList.contains('hidden')) closeModal(); });
    render();
    setInterval(refreshToday, 60000);
  </script>
</body>
</html>
