<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="ACEYA Youth Conference — Detroit, July 3–8, 2026">
  <meta name="theme-color" content="#f7f8fa" id="meta-theme">
  <title>ACEYA Conference</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --bg: #f7f8fa;
      --surface: #ffffff;
      --surface-alt: #f0f2f5;
      --text: #111827;
      --text-muted: #5b6472;
      --text-faint: #8b939f;
      --border: #e4e7ec;
      --accent: #9a7424;
      --accent-bg: #faf6ee;
      --hero-bg: #152238;
      --hero-text: #f7f8fa;
      --modal-overlay: rgba(17, 24, 39, 0.4);
      --pill-bg: #eef0f3;
      --pill-active: #152238;
      --pill-active-text: #f7f8fa;
      --nav-glass: rgba(255, 255, 255, 0.82);
      --next-ring: #9a7424;
      --day-tints: #f4f7fb, #faf7f0, #f3f8f5, #f6f4fa, #faf5f2, #f4f5f7;
    }
    [data-theme="dark"] {
      --bg: #0c1118;
      --surface: #161d27;
      --surface-alt: #1c2430;
      --text: #eef1f5;
      --text-muted: #9aa3b0;
      --text-faint: #6b7585;
      --border: #2a3340;
      --accent: #d4b06a;
      --accent-bg: #1f2835;
      --hero-bg: #1a2433;
      --hero-text: #eef1f5;
      --modal-overlay: rgba(0, 0, 0, 0.55);
      --pill-bg: #1c2430;
      --pill-active: #d4b06a;
      --pill-active-text: #0c1118;
      --nav-glass: rgba(12, 17, 24, 0.88);
      --next-ring: #d4b06a;
      --day-tints: #141c28, #1a1c18, #141c1a, #18161c, #1c1816, #16181c;
    }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    .nav-bar {
      background: var(--nav-glass);
      backdrop-filter: blur(20px) saturate(1.2);
      -webkit-backdrop-filter: blur(20px) saturate(1.2);
      border-top: 1px solid var(--border);
    }

    .card-btn:active { opacity: 0.85; }
    .card-btn:focus-visible, .icon-btn:focus-visible, .nav-tab:focus-visible {
      outline: 2px solid var(--accent); outline-offset: 2px;
    }

    .modal-panel { transform: translateY(12px); opacity: 0; transition: transform 0.2s ease, opacity 0.2s ease; }
    .modal-panel.open { transform: translateY(0); opacity: 1; }
    .modal-backdrop { opacity: 0; transition: opacity 0.2s ease; }
    .modal-backdrop.open { opacity: 1; }
    .modal-open { overflow: hidden; }

    .nav-tab.active { color: var(--accent); font-weight: 600; }
    .theme-pill { background: var(--pill-bg); border: 1px solid var(--border); }
    .theme-pill button[aria-pressed="true"] { background: var(--pill-active); color: var(--pill-active-text); }
    .event-card.is-next { box-shadow: inset 0 0 0 2px var(--next-ring); }
    .tabular { font-variant-numeric: tabular-nums; }

    @media (prefers-reduced-motion: reduce) {
      *, .modal-panel { transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body class="pb-[72px]">

  <div id="app" class="max-w-lg mx-auto"></div>

  <div id="modal-root" class="fixed inset-0 z-50 hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="modal-backdrop" class="modal-backdrop absolute inset-0" style="background:var(--modal-overlay)" tabindex="-1"></div>
    <div class="relative flex items-end sm:items-center justify-center min-h-full p-4 pointer-events-none">
      <div id="modal-panel" class="modal-panel pointer-events-auto w-full max-w-lg rounded-2xl overflow-hidden max-h-[88vh] flex flex-col" style="background:var(--surface);border:1px solid var(--border)">
        <div class="flex items-start justify-between gap-3 px-5 pt-5 pb-4" style="border-bottom:1px solid var(--border)">
          <div class="min-w-0">

            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div id="modal-body" class="px-5 py-5 overflow-y-auto leading-relaxed space-y-3 text-[15px]" style="color:var(--text-muted)"></div>
      </div>
    </div>
  </div>

        Today
      </button>
      <button type="button" class="nav-tab flex-1 flex flex-col items-center gap-0.5 py-2 text-[11px] font-medium" style="color:var(--text-faint)" data-tab="schedule">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Schedule
      </button>
      <button type="button" class="nav-tab flex-1 flex flex-col items-center gap-0.5 py-2 text-[11px] font-medium" style="color:var(--text-faint)" data-tab="more">

        More
      </button>
    </div>
  </nav>

  <script>

          { time: '7:00 – 9:30 PM', title: 'Opening Service & Fellowship', location: 'Church / chapel', detail: 'Opening prayer service, then icebreakers and fellowship.', eventType: 'worship', dressCodeCategory: 'church-service', specificRules: ['Sunday-best for service', 'Hats off during worship'] },

          { time: '8:30 – 11:30 AM', title: 'Morning Prayer & Workshops', location: 'Chapel & workshop rooms', detail: 'Morning prayers, then workshop tracks on faith and service.', eventType: 'workshop', dressCodeCategory: 'modest-casual', specificRules: ['Dress modestly from the start', 'Bring Bible and notebook'] },
          { time: '1:00 – 5:00 PM', title: 'Small Groups & Activities', location: 'Outdoor courts & meeting rooms', detail: 'Small group discussions and team-building activities.', eventType: 'social', dressCodeCategory: 'casual-activity', specificRules: ['Closed-toe shoes for outdoor activities', 'Bring water'] },

          { time: '8:30 – 11:30 AM', title: 'Morning Liturgy & Teaching', location: 'Church / chapel', detail: 'Holy Qurbana or morning prayer, then teaching session.', eventType: 'liturgy', dressCodeCategory: 'church-service', specificRules: ['No shorts during Holy Qurbana', 'All attendees expected'] },
          { time: '1:00 – 5:00 PM', title: 'Community Service Project', location: 'Off-site — bus departs main entrance', detail: 'Hands-on service in the local community.', eventType: 'service-project', dressCodeCategory: 'casual-activity', specificRules: ['Closed-toe shoes required', 'Sunscreen recommended'] },
          { time: '7:00 – 9:30 PM', title: 'Talent & Fellowship Night', location: 'Main hall', detail: 'Youth-led talent showcase and fellowship.', eventType: 'social', dressCodeCategory: 'modest-casual', specificRules: ['Modest attire when performing'] },
        ]},

          { time: '9:00 AM – 12:00 PM', title: 'Holy Qurbana', location: 'Church / chapel', detail: 'Central worship of the conference week. All attendees expected.', eventType: 'liturgy', dressCodeCategory: 'church-service', specificRules: ['No shorts during Holy Qurbana', 'Sunday best required', 'Arrive on time'] },
          { time: '1:00 – 5:00 PM', title: 'Rest & Reflection', location: 'Dorms & quiet areas', detail: 'Rest, journaling, optional quiet prayer.', eventType: 'social', dressCodeCategory: 'modest-casual', specificRules: ['Respect quiet hours in dorms'] },

          { time: '8:30 – 11:30 AM', title: 'Leadership Plenary', location: 'Main hall', detail: 'Keynotes on youth leadership. Q&A with clergy and leaders.', eventType: 'workshop', dressCodeCategory: 'modest-casual', specificRules: ['Bring notebook'] },
          { time: '1:00 – 5:00 PM', title: 'Parish Planning Workshops', location: 'Breakout rooms', detail: 'Parish delegations plan for the year ahead.', eventType: 'workshop', dressCodeCategory: 'modest-casual', specificRules: ['Attend with your parish group'] },
          { time: '7:00 – 10:00 PM', title: 'Banquet & Awards', location: 'Banquet hall', detail: 'Formal banquet. Recognition of youth leaders.', eventType: 'banquet', dressCodeCategory: 'semi-formal', specificRules: ['No jeans, shorts, or sneakers', 'Semi-formal required'] },

        { title: 'Casual & Activities', summary: 'Modest casual / activity wear', categoryId: 'modest-casual' },

      ],
      keyInfo: [

        { title: 'Important Notes', summary: 'Policies & expectations', detail: `<ul class="list-disc pl-5 space-y-1"><li>Attend all worship services</li><li>Follow youth leader guidance</li><li>Substance-free conference</li><li>Phones silent during services</li><li>Emergency: call 911, then notify your leader</li></ul>` },
      ],
      quickLinks: [

        { title: 'Contact', detail: `<p>Contact your parish youth leader first. Visit <a href="https://www.aceya.net/" class="underline font-medium" style="color:var(--accent)" target="_blank" rel="noopener">aceya.net</a> for general inquiries.</p><p class="mt-3"><strong>Emergency:</strong> 911, then your youth leader.</p>` },

    // ═══════════════════════════════════════════════════════════════════════════

    const $ = (s) => document.querySelector(s);
    const app = $('#app');
    let lastFocus = null;
    let currentTab = 'today';
    const DAY_TINTS = ['var(--day-tint-0)','var(--day-tint-1)','var(--day-tint-2)','var(--day-tint-3)','var(--day-tint-4)','var(--day-tint-5)'];

    function getTheme() {
      return localStorage.getItem('aceya-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    }
    function setTheme(t) {
      document.documentElement.dataset.theme = t;
      localStorage.setItem('aceya-theme', t);
      $('#meta-theme').content = t === 'dark' ? '#0c1118' : '#f7f8fa';
      renderHeaderControls();
    }

    function parseDate(str) { const [y,m,d] = str.split('-').map(Number); return new Date(y,m-1,d); }
    function getDayLabel(d) { return parseDate(d).toLocaleDateString('en-US', { weekday: 'long' }); }
    function todayStr() { const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; }
    function getPhase() {
      const t = new Date(); t.setHours(0,0,0,0);
      const s = parseDate(CONFERENCE_DATA.conference.dateStart);
      const e = parseDate(CONFERENCE_DATA.conference.dateEnd); e.setHours(23,59,59,999);
      if (t < s) return 'before'; if (t > e) return 'after'; return 'during';
    }
    function getTodayDay() {
      const phase = getPhase();
      if (phase === 'before') return { day: CONFERENCE_DATA.schedule[0], dayIdx: 0 };
      if (phase === 'after') { const i = CONFERENCE_DATA.schedule.length - 1; return { day: CONFERENCE_DATA.schedule[i], dayIdx: i }; }
      const idx = CONFERENCE_DATA.schedule.findIndex((d) => d.date === todayStr());
      const i = idx >= 0 ? idx : 0;
      return { day: CONFERENCE_DATA.schedule[i], dayIdx: i };
    }
    function getDressCat(b) { return CONFERENCE_DATA.dressCodeCategories[b.dressCodeCategory]; }
    function getRules(b) { return (b.specificRules || []).filter(Boolean); }
    function getAllEvents() {
      return CONFERENCE_DATA.schedule.flatMap((day, dayIdx) =>
        day.blocks.filter((b) => b.time !== '—').map((block, blockIdx) => ({ day, dayIdx, block, blockIdx }))
      );
    }
    function parseBlockHour(time) {
      const m = time.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
      if (!m) return null;
      let h = parseInt(m[1],10);
      if (m[3].toUpperCase()==='PM' && h!==12) h+=12;
      if (m[3].toUpperCase()==='AM' && h===12) h=0;
      return h;
    }
    function getNextEvent() {
      const now = new Date(); const phase = getPhase(); const events = getAllEvents();
      if (phase === 'before') return events[0];
      if (phase === 'after') return events[events.length - 1];
      const ts = todayStr(); const nowMins = now.getHours()*60 + now.getMinutes();
      const todayEv = events.filter((e) => e.day.date === ts);
      if (!todayEv.length) return events.find((e) => e.day.date > ts) || events[events.length-1];
      for (const ev of todayEv) {
        const h = parseBlockHour(ev.block.time);
        if (h !== null && h*60 > nowMins) return ev;
      }
      return events.find((e) => e.day.date > ts) || todayEv[todayEv.length-1];
    }

    function dressLabel(block) {
      const c = getDressCat(block);
      return c ? `<span class="text-xs font-medium" style="color:var(--accent)">${c.shortLabel}</span>` : '';
    }

    function dressBlock(block, { compact = false, onHero = false } = {}) {
      const c = getDressCat(block); const rules = getRules(block);
      if (!c) return '';
      const rulesHtml = rules.length
        ? `<ul class="mt-2 space-y-1 ${compact ? 'text-[13px]' : 'text-sm'}">${rules.map((r) => `<li>${r}</li>`).join('')}</ul>` : '';
      const guideHtml = compact ? '' : `<ul class="mt-2 space-y-1 text-sm">${c.guidelines.map((g) => `<li>${g}</li>`).join('')}</ul><p class="mt-3 text-xs" style="color:var(--text-faint)">Avoid: ${c.avoid}</p>`;
      const bg = onHero ? 'rgba(255,255,255,0.08)' : 'var(--accent-bg)';
      const labelColor = onHero ? 'rgba(255,255,255,0.65)' : 'var(--text-faint)';
      const textColor = onHero ? 'var(--hero-text)' : 'var(--text)';
      return `<div class="rounded-xl p-4 mt-4" style="background:${bg}">
        <p class="text-xs font-medium uppercase tracking-wide" style="color:${labelColor}">What to wear</p>
        <p class="font-medium mt-1 ${compact ? 'text-[15px]' : 'text-base'}" style="color:${textColor}">${c.label}</p>
        ${guideHtml}
        ${rules.length && compact ? `<p class="text-xs font-medium mt-3" style="color:${labelColor}">Notes</p>` : ''}
        ${rulesHtml}
      </div>`;
    }

    function eventCard(block, dayIdx, blockIdx, { isNext = false } = {}) {
      const loc = block.location || CONFERENCE_DATA.conference.defaultVenue;
      return `<button type="button" data-action="event" data-day="${dayIdx}" data-block="${blockIdx}"
        class="card-btn event-card w-full text-left p-4 rounded-xl min-h-[56px] ${isNext ? 'is-next' : ''}"
        style="background:var(--surface);border:1px solid var(--border)"
        aria-label="${block.title}, ${block.time}">
        <p class="tabular text-[13px]" style="color:var(--text-faint)">${block.time}</p>
        <p class="font-medium mt-1 leading-snug">${block.title}</p>
        <div class="flex items-center justify-between gap-3 mt-2">
          <p class="text-[13px] truncate" style="color:var(--text-muted)">${loc}</p>
          ${dressLabel(block)}
        </div>
      </button>`;
    }

    function eventModalBody(block) {
      const loc = block.location || CONFERENCE_DATA.conference.defaultVenue;
      return `<p class="tabular text-sm font-medium" style="color:var(--accent)">${block.time}</p>
        <p class="mt-4 text-sm font-medium" style="color:var(--text)">${loc}</p>
        <p class="mt-4">${block.detail}</p>
        ${dressBlock(block)}`;
    }

    function renderWhatsNext() {
      const { day, block } = getNextEvent();
      const loc = block.location || CONFERENCE_DATA.conference.defaultVenue;
      const phase = getPhase();
      const label = phase === 'before' ? 'Upcoming' : phase === 'after' ? 'Ended' : day.date === todayStr() ? 'Up next' : getDayLabel(day.date);

      return `<section class="mb-8" aria-labelledby="whats-next">
        <div class="rounded-2xl p-5" style="background:var(--hero-bg);color:var(--hero-text)">
          <div class="flex items-center justify-between mb-4">
            <h2 id="whats-next" class="text-xs font-medium uppercase tracking-wide opacity-70">What's Next</h2>
            <span class="text-xs font-medium px-2 py-0.5 rounded-md" style="background:rgba(255,255,255,0.1)">${label}</span>
          </div>
          <h3 class="text-2xl font-semibold leading-tight tracking-tight">${block.title}</h3>
          <p class="tabular mt-2 text-[15px] opacity-75">${block.time}</p>
          <p class="mt-3 text-[15px] leading-relaxed opacity-85">${block.detail}</p>
          <p class="mt-3 text-[15px] opacity-75">${loc}</p>
          ${dressBlock(block, { compact: true, onHero: true })}
          <button type="button" data-action="next-detail" class="mt-5 w-full min-h-[48px] rounded-xl text-sm font-semibold" style="background:var(--accent);color:#fff">View full details</button>
        </div>
      </section>`;
    }

    function renderTodayTab() {
      const { day, dayIdx } = getTodayDay();
      const next = getNextEvent();
      const blocks = day.blocks.filter((b) => b.time !== '—');
      const header = getPhase() === 'during' && day.date === todayStr()
        ? `Today · ${getDayLabel(day.date)}`
        : `${getDayLabel(day.date)} · Jul ${parseInt(day.date.slice(8), 10)}`;

      return `${renderWhatsNext()}
        <section aria-labelledby="today-agenda">
          <h2 id="today-agenda" class="text-base font-semibold">${day.title}</h2>
          <p class="text-sm mt-0.5" style="color:var(--text-muted)">${header}</p>
          <div class="mt-4 space-y-2">${blocks.map((block, i) => eventCard(block, dayIdx, i, { isNext: next.dayIdx === dayIdx && next.blockIdx === i })).join('')}</div>
        </section>`;
    }

    function renderScheduleTab() {
      const tints = getComputedStyle(document.documentElement);
      const days = CONFERENCE_DATA.schedule.map((day, dayIdx) => {
        const tintVar = `--day-tint-${dayIdx % 6}`;
        const events = day.blocks.filter((b) => b.time !== '—').map((block, blockIdx) => eventCard(block, dayIdx, blockIdx)).join('');
        return `<div class="rounded-2xl overflow-hidden" style="background:var(${tintVar});border:1px solid var(--border)">
          <div class="px-4 py-4" style="border-bottom:1px solid var(--border)">
            <p class="text-xs font-medium" style="color:var(--text-muted)">${getDayLabel(day.date)} · Jul ${parseInt(day.date.slice(8), 10)}</p>
            <p class="text-base font-semibold mt-1">${day.title}</p>
          </div>
          <div class="p-3 space-y-2">${events}</div>
        </div>`;
      }).join('');

      return `<section>
        <h2 class="text-base font-semibold">Full Schedule</h2>
        <p class="text-sm mt-0.5 mb-5" style="color:var(--text-muted)">July 3–8 · Detroit</p>
        <div class="space-y-4">${days}</div>
      </section>`;
    }

    function renderMoreTab() {
      const section = (title, html) => `<div class="mb-8"><h3 class="text-xs font-medium uppercase tracking-wide mb-3" style="color:var(--text-muted)">${title}</h3>${html}</div>`;

      const dressCards = CONFERENCE_DATA.dressCode.map((item, i) => `
        <button type="button" data-more-action="dress" data-index="${i}" class="card-btn w-full text-left p-4 rounded-xl min-h-[52px] mb-2" style="background:var(--surface);border:1px solid var(--border)">
          <p class="font-medium">${item.title}</p>
          <p class="text-sm mt-0.5" style="color:var(--text-muted)">${item.summary}</p>
        </button>`).join('');

      const mapRows = CONFERENCE_DATA.eventTypeDressMap.map((row) => {
        const evt = CONFERENCE_DATA.eventTypes[row.eventType];
        const cat = CONFERENCE_DATA.dressCodeCategories[row.dressCodeCategory];
        return `<div class="flex justify-between gap-4 py-3 text-sm" style="border-bottom:1px solid var(--border)">
          <div><span class="font-medium">${evt?.label}</span><span class="block text-xs mt-0.5" style="color:var(--text-faint)">${row.note}</span></div>
          <span class="text-xs font-medium shrink-0" style="color:var(--accent)">${cat?.shortLabel}</span>
        </div>`;
      }).join('');

      const infoCards = CONFERENCE_DATA.keyInfo.map((item, i) => `
        <button type="button" data-more-action="info" data-index="${i}" class="card-btn w-full text-left p-4 rounded-xl min-h-[52px] mb-2" style="background:var(--surface);border:1px solid var(--border)">
          <p class="font-medium">${item.title}</p>
          <p class="text-sm mt-0.5" style="color:var(--text-muted)">${item.summary}</p>
        </button>`).join('');

      const links = CONFERENCE_DATA.quickLinks.map((link, i) => link.url
        ? `<a href="${link.url}" target="_blank" rel="noopener" class="flex items-center justify-between p-4 rounded-xl min-h-[52px] mb-2" style="background:var(--surface);border:1px solid var(--border)"><span class="font-medium">${link.title}</span><span class="text-sm" style="color:var(--accent)">→</span></a>`
        : `<button type="button" data-more-action="link" data-index="${i}" class="card-btn w-full text-left p-4 rounded-xl min-h-[52px] mb-2" style="background:var(--surface);border:1px solid var(--border)"><p class="font-medium">${link.title}</p></button>`
      ).join('');

      return `${section('Dress Code', dressCards + `<div class="rounded-xl p-4 mt-2" style="background:var(--surface-alt)">${mapRows}</div>`)}
        ${section('Key Information', infoCards)}
        ${section('Resources', links)}`;
    }

    function renderTabContent() {
      if (currentTab === 'today') return renderTodayTab();
      if (currentTab === 'schedule') return renderScheduleTab();
      return renderMoreTab();
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.nav-tab').forEach((btn) => {
        const active = btn.dataset.tab === tab;
        btn.classList.toggle('active', active);
        btn.style.color = active ? '' : 'var(--text-faint)';
        btn.setAttribute('aria-current', active ? 'page' : null);
      });
      $('#tab-content').innerHTML = renderTabContent();
      bindTabEvents();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function openModal({ eyebrow, title, body }) {
      lastFocus = document.activeElement;
      $('#modal-eyebrow').textContent = eyebrow || '';
      $('#modal-eyebrow').classList.toggle('hidden', !eyebrow);
      $('#modal-title').textContent = title;
      $('#modal-body').innerHTML = body;
      $('#modal-root').classList.remove('hidden');
      document.body.classList.add('modal-open');
      requestAnimationFrame(() => { $('#modal-backdrop').classList.add('open'); $('#modal-panel').classList.add('open'); });
      $('#modal-close').focus();
    }
    function closeModal() {
      $('#modal-backdrop').classList.remove('open');
      $('#modal-panel').classList.remove('open');
      setTimeout(() => { $('#modal-root').classList.add('hidden'); document.body.classList.remove('modal-open'); lastFocus?.focus(); }, 200);
    }
    function getDressModalContent(item) {
      if (item.detail) return item.detail;
      if (item.categoryId) {
        const c = CONFERENCE_DATA.dressCodeCategories[item.categoryId];
        return `<p class="font-medium">${c.label}</p><ul class="list-disc pl-5 mt-3 space-y-1">${c.guidelines.map((g) => `<li>${g}</li>`).join('')}</ul><p class="mt-4 text-sm" style="color:var(--text-faint)">Avoid: ${c.avoid}</p>`;
      }
      return '<p>Not available.</p>';
    }

    function renderHeaderControls() {
      const theme = getTheme();
      const el = $('#header-controls'); if (!el) return;
      el.innerHTML = `<div class="theme-pill flex rounded-full p-0.5">
        <button type="button" data-theme-set="light" aria-pressed="${theme==='light'}" aria-label="Day mode" class="flex items-center justify-center w-8 h-8 rounded-full">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </button>
        <button type="button" data-theme-set="dark" aria-pressed="${theme==='dark'}" aria-label="Night mode" class="flex items-center justify-center w-8 h-8 rounded-full">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
      </div>`;
      el.querySelectorAll('[data-theme-set]').forEach((btn) => btn.addEventListener('click', () => setTheme(btn.dataset.themeSet)));
    }

    function render() {
      const c = CONFERENCE_DATA.conference;
      // Inject day tint CSS variables
      const tints = getComputedStyle(document.documentElement);
      const root = document.documentElement;
      const lightTints = ['#f4f7fb','#faf7f0','#f3f8f5','#f6f4fa','#faf5f2','#f4f5f7'];
      const darkTints = ['#141c28','#1a1c18','#141c1a','#18161c','#1c1816','#16181c'];
      const isDark = getTheme() === 'dark';
      lightTints.forEach((_, i) => root.style.setProperty(`--day-tint-${i}`, isDark ? darkTints[i] : lightTints[i]));

      app.innerHTML = `
        <header class="sticky top-0 z-20 px-5 pt-4 pb-3" style="background:var(--bg)">
          <div class="flex items-start justify-between gap-4">
            <div class="min-w-0">
              <p class="text-xs font-medium" style="color:var(--accent)">${c.subtitle}</p>
              <h1 class="text-xl font-semibold tracking-tight mt-0.5">${c.name}</h1>
              <p class="text-sm mt-1" style="color:var(--text-muted)">${c.dates} · ${c.location}</p>
            </div>
            <div id="header-controls" class="shrink-0 pt-1"></div>
          </div>
        </header>
        <main id="tab-content" class="px-5 pb-6">${renderTabContent()}</main>
        <footer class="text-center px-5 pb-8">
          <p class="text-xs" style="color:var(--text-faint)">Last updated ${CONFERENCE_DATA.lastUpdated}</p>
        </footer>`;
      renderHeaderControls();
      bindTabEvents();
    }

    function bindTabEvents() {
      const root = $('#tab-content');
      root.onclick = (e) => {
        const btn = e.target.closest('[data-action]');
        if (btn) {
          if (btn.dataset.action === 'next-detail') {
            const n = getNextEvent();
            openModal({ eyebrow: `${getDayLabel(n.day.date)} · ${n.block.time}`, title: n.block.title, body: eventModalBody(n.block) });
          }
          if (btn.dataset.action === 'event') {
            const day = CONFERENCE_DATA.schedule[parseInt(btn.dataset.day, 10)];
            const block = day.blocks[parseInt(btn.dataset.block, 10)];
            openModal({ eyebrow: getDayLabel(day.date), title: block.title, body: eventModalBody(block) });
          }
          return;
        }
        const more = e.target.closest('[data-more-action]');
        if (more) {
          const idx = parseInt(more.dataset.index, 10);
          if (more.dataset.moreAction === 'dress') openModal({ eyebrow: 'Dress Code', title: CONFERENCE_DATA.dressCode[idx].title, body: getDressModalContent(CONFERENCE_DATA.dressCode[idx]) });
          if (more.dataset.moreAction === 'info') openModal({ eyebrow: 'Info', title: CONFERENCE_DATA.keyInfo[idx].title, body: CONFERENCE_DATA.keyInfo[idx].detail });
          if (more.dataset.moreAction === 'link') openModal({ eyebrow: 'Resources', title: CONFERENCE_DATA.quickLinks[idx].title, body: CONFERENCE_DATA.quickLinks[idx].detail });
        }
      };
    }

    setTheme(getTheme());
    document.querySelectorAll('.nav-tab').forEach((btn) => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
    $('#modal-close').addEventListener('click', closeModal);
    $('#modal-backdrop').addEventListener('click', closeModal);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !$('#modal-root').classList.contains('hidden')) closeModal(); });
    render();
    setInterval(() => { if (currentTab === 'today') { $('#tab-content').innerHTML = renderTodayTab(); bindTabEvents(); } }, 60000);
  </script>
</body>
</html>
