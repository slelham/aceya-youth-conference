    const $ = (sel) => document.querySelector(sel);

    function parseDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function formatDateLong(str) {
      return parseDate(str).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }

    function getConferencePhase() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const start = parseDate(CONFERENCE_DATA.conference.dateStart);
      const end = parseDate(CONFERENCE_DATA.conference.dateEnd);
      end.setHours(23, 59, 59, 999);

      if (today < start) return 'before';
      if (today > end) return 'after';
      return 'during';
    }

    function getActiveDayIndex() {
      const phase = getConferencePhase();
      if (phase === 'before') return 0;
      if (phase === 'after') return CONFERENCE_DATA.schedule.length - 1;

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const idx = CONFERENCE_DATA.schedule.findIndex((day) => {
        const d = parseDate(day.date);
        return d.getTime() === today.getTime();
      });
      return idx >= 0 ? idx : 0;
    }

    function getWhatsNext() {
      const phase = getConferencePhase();
      const dayIdx = selectedDayIndex !== null ? selectedDayIndex : getActiveDayIndex();
      const day = CONFERENCE_DATA.schedule[dayIdx];
      const now = new Date();

      if (phase === 'before') {
        return {
          phase,
          day,
          dayIdx,
          headline: 'Conference begins soon',
          subline: `${day.dayLabel}, ${formatDateLong(day.date)}`,
          featured: day.blocks.find((b) => b.period === 'Evening') || day.blocks[0],
          badge: 'Upcoming',
        };
      }

      if (phase === 'after') {
        return {
          phase,
          day,
          dayIdx,
          headline: 'Conference has concluded',
          subline: 'Thank you for a blessed week',
          featured: day.blocks[0],
          badge: 'Completed',
        };
      }

      const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
      const isToday = day.date === todayStr;
      let featured = day.blocks[0];
      let badge = isToday ? 'Today' : day.dayLabel;

      if (isToday) {
        const hour = now.getHours();
        if (hour >= 17) featured = day.blocks.find((b) => b.period === 'Evening') || day.blocks[2];
        else if (hour >= 12) featured = day.blocks.find((b) => b.period === 'Afternoon') || day.blocks[1];
        else featured = day.blocks.find((b) => b.period === 'Morning') || day.blocks[0];
      }

      return {
        phase,
        day,
        dayIdx,
        headline: isToday ? `Today — ${day.title}` : `${day.dayLabel} — ${day.title}`,
        subline: formatDateLong(day.date),
        featured,
        badge,
      };
    }

    function openModal({ eyebrow, title, bodyHtml, footerHtml }) {
      lastFocus = document.activeElement;
      modalEyebrow.textContent = eyebrow || '';
      modalEyebrow.classList.toggle('hidden', !eyebrow);
      modalTitle.textContent = title;
      modalBody.innerHTML = bodyHtml;
      if (footerHtml) {
        modalFooter.innerHTML = footerHtml;
        modalFooter.classList.remove('hidden');
      } else {
        modalFooter.classList.add('hidden');
        modalFooter.innerHTML = '';
      }
      modalRoot.classList.remove('hidden');
      document.body.classList.add('modal-open');
      requestAnimationFrame(() => {
        modalBackdrop.classList.add('open');
        modalPanel.classList.add('open');
      });
      $('#modal-close').focus();
    }

    function closeModal() {
      modalBackdrop.classList.remove('open');
      modalPanel.classList.remove('open');
      setTimeout(() => {
        modalRoot.classList.add('hidden');
        document.body.classList.remove('modal-open');
        if (lastFocus) lastFocus.focus();
      }, 250);
    }

            </span>
            <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-white border border-navy-100 text-navy-800">
              <svg class="w-4 h-4 text-gold-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              ${c.location}
            </span>
          </div>
          <p class="mt-4 text-lg sm:text-xl font-semibold text-gold-700">"${c.theme}"</p>
          <p class="mt-1 text-sm text-navy-500">${c.tagline}</p>
        </header>`;
    }

    function renderWhatsNext() {
      const w = getWhatsNext();
      const reg = CONFERENCE_DATA.registration;
      const dayOptions = CONFERENCE_DATA.schedule.map((d, i) =>
        `<option value="${i}" ${i === w.dayIdx ? 'selected' : ''}>${d.dayLabel} — ${d.title}</option>`
      ).join('');

      return `
        <section class="mb-6" aria-labelledby="whats-next-heading">
          <div class="whats-next-glow rounded-2xl p-5 sm:p-6 text-white shadow-lg">
            <div class="flex items-center justify-between gap-3 mb-3">
              <h2 id="whats-next-heading" class="text-sm font-semibold uppercase tracking-wider text-gold-300">What's Next</h2>
              <span class="px-2.5 py-1 rounded-lg bg-gold-500/20 text-gold-200 text-xs font-bold uppercase tracking-wide">${w.badge}</span>
            </div>
            <p class="text-xl sm:text-2xl font-bold leading-tight">${w.headline}</p>
            <p class="mt-1 text-navy-200 text-sm">${w.subline}</p>

            <div class="mt-4 p-4 rounded-xl bg-white/10 backdrop-blur border border-white/10">
              <div class="flex items-start gap-3">
                <span class="text-2xl" aria-hidden="true">${periodIcon(w.featured.period)}</span>
                <div class="min-w-0 flex-1">
                  <p class="text-gold-300 text-xs font-semibold uppercase tracking-wide">${w.featured.period} · ${w.featured.time}</p>
                  <p class="mt-0.5 font-semibold text-lg">${w.featured.title}</p>
                  <p class="mt-1 text-sm text-navy-200 line-clamp-2">${w.featured.detail}</p>
                </div>
              </div>
              <button type="button" data-action="whats-next-detail"
                class="mt-3 w-full sm:w-auto px-4 py-2.5 min-h-[44px] rounded-xl bg-gold-500 hover:bg-gold-400 text-navy-950 font-semibold text-sm transition-colors">
                View details
              </button>
            </div>

            <div class="mt-4 flex flex-col sm:flex-row sm:items-center gap-2">
              <label for="day-select" class="text-xs text-navy-300 shrink-0">Browse by day:</label>
              <select id="day-select" class="flex-1 min-h-[44px] px-3 py-2 rounded-xl bg-navy-800 border border-navy-600 text-white text-sm font-medium focus:outline-none focus:ring-2 focus:ring-gold-400">
                ${dayOptions}
              </select>
            </div>

            ${w.phase === 'before' ? `
              <div class="mt-4 flex items-center gap-2 px-3 py-2 rounded-xl bg-gold-500/15 border border-gold-400/20">
                <span class="text-gold-300 text-sm font-medium">Registration: ${reg.status}</span>
                <a href="${reg.url}" target="_blank" rel="noopener" class="ml-auto text-xs font-semibold text-gold-300 underline hover:text-gold-200">Register →</a>
              </div>` : ''}
          </div>
        </section>`;
    }

    function renderSchedule() {
      const cards = CONFERENCE_DATA.schedule.map((day, dayIdx) => {
        const blockCards = day.blocks.map((block, blockIdx) => ({ block, blockIdx }))
          .filter(({ block }) => block.period !== 'Evening' || block.time !== '—')
          .map(({ block, blockIdx }) =>
          cardButton(
            { class: '!p-3.5', data: `data-action="schedule-block" data-day="${dayIdx}" data-block="${blockIdx}"`, aria: `${day.dayLabel} ${block.period}: ${block.title}` },
            `<div class="flex items-center gap-3">
              <span class="text-xl shrink-0" aria-hidden="true">${periodIcon(block.period)}</span>
              <div class="min-w-0">
                <p class="text-xs font-semibold text-gold-700 uppercase tracking-wide">${block.period}</p>
                <p class="font-semibold text-navy-900 text-sm leading-snug">${block.title}</p>
                <p class="text-xs text-navy-500 mt-0.5">${block.time}</p>
              </div>
              <svg class="w-4 h-4 text-navy-300 shrink-0 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </div>`
          )
        ).join('');

        const dayBtn = cardButton(
          { data: `data-action="schedule-day" data-day="${dayIdx}"`, aria: `View full schedule for ${day.dayLabel}` },
          `<div class="flex items-center gap-3 mb-3 pb-3 border-b border-navy-50">
            <div class="w-10 h-10 rounded-xl bg-navy-900 text-gold-400 flex items-center justify-center font-bold text-sm shrink-0">${day.dayLabel.slice(0, 3)}</div>
            <div class="min-w-0">
              <p class="font-bold text-navy-900">${day.dayLabel}</p>
              <p class="text-sm text-navy-600">${day.title}</p>
            </div>
          </div>
          <div class="space-y-2">${blockCards}</div>`
        );

        return `<div class="col-span-1">${dayBtn}</div>`;
      }).join('');

      return `
        <section class="mb-8" aria-labelledby="schedule-heading">
          <h2 id="schedule-heading" class="text-lg font-bold text-navy-900 mb-3 flex items-center gap-2">
            <span class="w-1 h-5 rounded-full bg-gold-500"></span>
            Schedule Overview
          </h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">${cards}</div>
        </section>`;
    }

    function renderSection(title, items, actionPrefix) {
      const cards = items.map((item, idx) =>
        cardButton(
          { data: `data-action="${actionPrefix}" data-index="${idx}"`, aria: `${item.title}: ${item.summary}` },
          `<div class="flex items-center gap-3">
            <span class="text-2xl shrink-0 w-10 h-10 flex items-center justify-center rounded-xl bg-navy-50" aria-hidden="true">${item.icon}</span>
            <div class="min-w-0 flex-1">
              <p class="font-semibold text-navy-900">${item.title}</p>
              <p class="text-sm text-navy-500 mt-0.5">${item.summary}</p>
            </div>
            <svg class="w-4 h-4 text-navy-300 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </div>`
        )
      ).join('');

      return `
        <section class="mb-8" aria-labelledby="${actionPrefix}-heading">
          <h2 id="${actionPrefix}-heading" class="text-lg font-bold text-navy-900 mb-3 flex items-center gap-2">
            <span class="w-1 h-5 rounded-full bg-gold-500"></span>
            ${title}
          </h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">${cards}</div>
        </section>`;
    }

    function renderQuickLinks() {
      const cards = CONFERENCE_DATA.quickLinks.map((link, idx) => {
        if (link.url) {
          return `<a href="${link.url}" ${link.external ? 'target="_blank" rel="noopener"' : ''}
            class="card-btn flex items-center gap-3 bg-white rounded-2xl border border-navy-100 p-4 sm:p-5 shadow-sm hover:shadow-md hover:border-gold-300 active:scale-[0.99] transition-all duration-200 min-h-[72px]">
            <span class="text-2xl shrink-0 w-10 h-10 flex items-center justify-center rounded-xl bg-gold-50" aria-hidden="true">${link.icon}</span>
            <div class="min-w-0 flex-1">
              <p class="font-semibold text-navy-900">${link.title}</p>
              <p class="text-sm text-navy-500 mt-0.5">${link.summary}</p>
            </div>
            <svg class="w-4 h-4 text-gold-600 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          </a>`;
        }
        return cardButton(
          { data: `data-action="quick-link" data-index="${idx}"`, aria: link.title },
          `<div class="flex items-center gap-3">
            <span class="text-2xl shrink-0 w-10 h-10 flex items-center justify-center rounded-xl bg-gold-50" aria-hidden="true">${link.icon}</span>
            <div class="min-w-0 flex-1">
              <p class="font-semibold text-navy-900">${link.title}</p>
              <p class="text-sm text-navy-500 mt-0.5">${link.summary}</p>
            </div>
            <svg class="w-4 h-4 text-navy-300 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </div>`
        );
      }).join('');

      return `
        <section class="mb-8" aria-labelledby="links-heading">
          <h2 id="links-heading" class="text-lg font-bold text-navy-900 mb-3 flex items-center gap-2">
            <span class="w-1 h-5 rounded-full bg-gold-500"></span>
            Quick Links
          </h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">${cards}</div>
        </section>`;
    }

    function renderFooter() {
      return `
        <footer class="text-center pt-4 border-t border-navy-100">
          <p class="text-xs text-navy-500">Last updated: ${CONFERENCE_DATA.lastUpdated}</p>
          <p class="text-xs text-navy-400 mt-1 max-w-md mx-auto">
            To edit content, open this file and update the <code class="text-navy-600 bg-navy-100 px-1 rounded">CONFERENCE_DATA</code> object near the top of the script.
          </p>
          <p class="text-xs text-navy-400 mt-3">© ${new Date().getFullYear()} ACEYA North America</p>
        </footer>`;
    }

    function render() {
      app.innerHTML = `
        <main id="main">
          ${renderHeader()}
          ${renderWhatsNext()}
          ${renderSchedule()}
          ${renderSection('Dress Code', CONFERENCE_DATA.dressCode, 'dress-code')}
          ${renderSection('Key Information', CONFERENCE_DATA.keyInfo, 'key-info')}
          ${renderQuickLinks()}
          ${renderFooter()}
        </main>`;
      bindEvents();
    }

    function bindEvents() {
      const daySelect = $('#day-select');
      if (daySelect) {
        daySelect.addEventListener('change', (e) => {
          selectedDayIndex = parseInt(e.target.value, 10);
          const whatsNextSection = document.querySelector('[aria-labelledby="whats-next-heading"]');
          if (whatsNextSection) {
            whatsNextSection.outerHTML = renderWhatsNext();
            bindEvents();
          }
        });
      }

      app.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;

        const action = btn.dataset.action;

        if (action === 'whats-next-detail') {
          const w = getWhatsNext();
          const f = w.featured;
          openModal({
            eyebrow: `${w.day.dayLabel} · ${f.period}`,
            title: f.title,
            bodyHtml: `<p class="text-sm font-medium text-gold-700 mb-2">${f.time}</p><p>${f.detail}</p>
              <p class="mt-4 text-sm text-navy-500">${w.day.summary}</p>`,
          });
          return;
        }

        if (action === 'schedule-day') {
          const day = CONFERENCE_DATA.schedule[parseInt(btn.dataset.day, 10)];
          const blocks = day.blocks.map((b) =>
            `<div class="py-3 border-b border-navy-100 last:border-0">
              <p class="text-xs font-semibold text-gold-700 uppercase">${b.period} · ${b.time}</p>
              <p class="font-semibold text-navy-900 mt-0.5">${b.title}</p>
              <p class="text-sm mt-1">${b.detail}</p>
            </div>`
          ).join('');
          openModal({
            eyebrow: formatDateLong(day.date),
            title: `${day.dayLabel} — ${day.title}`,
            bodyHtml: `<p class="text-sm text-navy-500 mb-2">${day.summary}</p>${blocks}`,
          });
          return;
        }

        if (action === 'schedule-block') {
          e.stopPropagation();
          const day = CONFERENCE_DATA.schedule[parseInt(btn.dataset.day, 10)];
          const block = day.blocks[parseInt(btn.dataset.block, 10)];
          openModal({
            eyebrow: `${day.dayLabel} · ${formatDateLong(day.date)}`,
            title: block.title,
            bodyHtml: `<p class="text-sm font-medium text-gold-700 mb-2">${block.period} · ${block.time}</p><p>${block.detail}</p>`,
          });
          return;
        }

        if (action === 'dress-code') {
          const item = CONFERENCE_DATA.dressCode[parseInt(btn.dataset.index, 10)];
          openModal({ eyebrow: 'Dress Code', title: item.title, bodyHtml: item.detail });
          return;
        }

        if (action === 'key-info') {
          const item = CONFERENCE_DATA.keyInfo[parseInt(btn.dataset.index, 10)];
          openModal({ eyebrow: 'Key Information', title: item.title, bodyHtml: item.detail });
          return;
        }

        if (action === 'quick-link') {
          const item = CONFERENCE_DATA.quickLinks[parseInt(btn.dataset.index, 10)];
          openModal({ eyebrow: 'Quick Links', title: item.title, bodyHtml: item.detail });
        }
      });
    }

    $('#modal-close').addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', closeModal);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !modalRoot.classList.contains('hidden')) closeModal();
    });

    render();
  </script>
</body>
</html>
